services:
  mysql:
    image: mysql:8.0
    container_name: ta-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_DATABASE: ${DB_NAME:-trade_analyze}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ta-api
    restart: unless-stopped
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DB_HOST: mysql
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy

  # 跑批服务：默认不常驻，由宿主机 cron 触发对应 job。
  # 也可改成此容器内 cron / APScheduler 常驻。这里提供镜像供手动执行。
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ta-engine
    command: ["python", "-m", "engine.jobs.daily_pipeline"]
    env_file: .env
    environment:
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    profiles: ["manual"]   # 默认不随 up 启动，用 --profile manual 手动跑

volumes:
  mysql_data:
